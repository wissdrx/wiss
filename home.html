<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ativação</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(135deg,#0d0d0d,#1a1a1a);
  color:white;
}
.box {
  background:#1a1a1a;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,0,0,0.6);
  transition:all 0.3s ease;
}
h2 { color:#ff0000; margin-bottom:20px; }
input, button {
  width:100%;
  padding:12px;
  border-radius:8px;
  margin-bottom:15px;
  border:none;
  font-size:14px;
}
input { background:#262626; color:white; }
button { background:#ff0000; color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { background:#cc0000; }
#msg { margin-top:10px; font-size:14px; min-height:18px; }
.hidden { display:none; }
.home-button { background:#00bfff; margin-bottom:10px; }
.home-button:hover { background:#0099cc; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="box" id="login-box">
  <h2>ATIVAR KEY</h2>
  <input type="text" id="keyInput" placeholder="Digite sua key">
  <button onclick="verificar()">Ativar</button>
  <div id="msg"></div>
</div>

<!-- HOME -->
<div class="box hidden" id="home-box">
  <h2>Bem-vindo!</h2>
  <button class="home-button" onclick="alert('Função 1 executada')">Função 1</button>
  <button class="home-button" onclick="alert('Função 2 executada')">Função 2</button>
  <button class="home-button" onclick="alert('Função 3 executada')">Função 3</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZskqB6BDWZd5dOn7H7vXYcBM4wGFEjp4",
  authDomain: "login-71251.firebaseapp.com",
  projectId: "login-71251",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ID ÚNICO DO DISPOSITIVO
function getDeviceId(){
  let id = localStorage.getItem("deviceId");
  if(!id){ id = "dev-" + Math.random().toString(36).substring(2,15); localStorage.setItem("deviceId",id); }
  return id;
}
const deviceId = getDeviceId();

// AUTO LOGIN SE JÁ SALVO
const savedKey = localStorage.getItem("savedKey");
if(savedKey){
  document.getElementById("keyInput").value = savedKey;
  verificar(true);
}

function verificar(auto=false){
  const key = document.getElementById("keyInput").value.trim().toUpperCase();
  const msg = document.getElementById("msg");
  if(!key){ msg.style.color="#ff0000"; msg.innerHTML="Digite uma key!"; return; }

  db.collection("chaves").where("key","==",key).get()
    .then(snapshot=>{
      if(snapshot.empty){ msg.style.color="#ff0000"; msg.innerHTML="Key inválida!"; return; }
      snapshot.forEach(doc=>{
        const data = doc.data();
        if(data.dataAtivacao){
          const ativ = data.dataAtivacao.toDate();
          const expira = new Date(ativ.getTime() + data.dias*24*60*60*1000);
          if(new Date() > expira){ msg.style.color="#ff0000"; msg.innerHTML="Key expirada!"; localStorage.removeItem("savedKey"); return; }
        }
        if(data.device && data.device !== deviceId){ msg.style.color="#ff0000"; msg.innerHTML="Key já usada em outro dispositivo!"; return; }
        if(!data.ativa){ db.collection("chaves").doc(doc.id).update({ ativa:true, device:deviceId, dataAtivacao:firebase.firestore.FieldValue.serverTimestamp() }); }
        localStorage.setItem("savedKey",key);
        msg.style.color="#00ff00"; msg.innerHTML="Acesso liberado!";
        setTimeout(()=>{
          document.getElementById("login-box").classList.add("hidden");
          document.getElementById("home-box").classList.remove("hidden");
        },1000);
      });
    })
    .catch(e=>{ msg.style.color="#ff0000"; msg.innerHTML=e.message; });
}
</script>

</body>
</html>
